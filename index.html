<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTRX // AI Contract Review Agent</title>
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-primary: #fafafa;
            --bg-secondary: #f4f4f5;
            --bg-card: #ffffff;
            --text-primary: #09090b;
            --text-secondary: #71717a;
            --border-color: #e4e4e7;
            --accent-black: #09090b;
            --accent-white: #ffffff;
            --shadow-subtle: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px 0 rgba(0, 0, 0, 0.03);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --transition-speed: 0.2s;
            --radius-md: 8px;
            --radius-lg: 12px;
            --dot-color: #e4e4e7;
        }

        [data-theme="dark"] {
            --bg-primary: #09090b;
            --bg-secondary: #121215;
            --bg-card: #18181b;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --border-color: #27272a;
            --accent-black: #f4f4f5;
            --accent-white: #09090b;
            --shadow-subtle: 0 4px 30px rgba(0, 0, 0, 0.4);
            --dot-color: #27272a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            transition: background-color var(--transition-speed), color var(--transition-speed), border-color var(--transition-speed);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            /* Monochromatic Dot Grid Background similar to Neon.tech */
            background-image: radial-gradient(var(--dot-color) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Header Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(var(--bg-card), 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .brand-logo {
            width: 18px;
            height: 18px;
            background-color: var(--text-primary);
            border-radius: 4px;
            display: inline-block;
            transform: rotate(45deg);
        }

        .controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        /* Monochromatic Sleek Buttons (Neon.tech style) */
        .btn-pill {
            background-color: var(--accent-black);
            color: var(--accent-white);
            border: 1px solid var(--accent-black);
            border-radius: var(--radius-md);
            padding: 0.6rem 1.25rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all var(--transition-speed) ease;
            text-decoration: none;
            user-select: none;
        }

        .btn-pill:hover {
            background-color: transparent;
            color: var(--text-primary);
            border-color: var(--text-primary);
        }

        .btn-pill-secondary {
            background-color: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 0.6rem 1.25rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
        }

        .btn-pill-secondary:hover {
            border-color: var(--text-primary);
            background-color: var(--bg-secondary);
        }

        /* Layout Grid */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            flex-grow: 1;
            height: calc(100vh - 73px);
            overflow: hidden;
        }

        @media (max-width: 992px) {
            .workspace {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                height: auto;
                overflow: visible;
            }
        }

        /* Panels styling */
        .panel {
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        .panel-left {
            border-right: 1px solid var(--border-color);
            background-color: transparent;
        }

        .panel-right {
            background-color: rgba(var(--bg-secondary), 0.3);
            border-left: 1px solid transparent;
        }

        .panel-title {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .panel-subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        /* Dropzone / Upload Area */
        .upload-container {
            border: 1px dashed var(--border-color);
            border-radius: var(--radius-lg);
            padding: 3.5rem 2rem;
            text-align: center;
            cursor: pointer;
            background-color: var(--bg-card);
            transition: border-color var(--transition-speed), transform var(--transition-speed), background-color var(--transition-speed);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
            box-shadow: var(--shadow-subtle);
            user-select: none;
        }

        .upload-container:hover, .upload-container.dragover {
            border-color: var(--text-primary);
            background-color: var(--bg-secondary);
        }

        .upload-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            background-color: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.25rem;
            transition: background-color var(--transition-speed);
            border: 1px solid var(--border-color);
        }

        .upload-container:hover .upload-icon {
            background-color: var(--bg-card);
            border-color: var(--text-primary);
        }

        .upload-icon svg {
            width: 24px;
            height: 24px;
            stroke: var(--text-primary);
            stroke-width: 1.5;
            fill: none;
        }

        /* Accessible visually-hidden input */
        .file-input {
            display: block;
            width: 0;
            height: 0;
            opacity: 0;
            overflow: hidden;
            position: absolute;
        }

        /* Document details workspace section */
        .document-workspace {
            display: none;
            flex-direction: column;
            flex-grow: 1;
            gap: 1.5rem;
        }

        .document-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-subtle);
        }

        .doc-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .doc-name {
            font-weight: 700;
            font-size: 0.95rem;
            word-break: break-all;
            color: var(--text-primary);
        }

        .doc-text-preview {
            max-height: 250px;
            overflow-y: auto;
            font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            color: var(--text-secondary);
            background-color: var(--bg-secondary);
            padding: 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            line-height: 1.6;
        }

        /* Text Area paste alternatives */
        .text-fallback-container {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .text-fallback-area {
            width: 100%;
            height: 120px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-card);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            padding: 1rem;
            resize: none;
            font-size: 0.875rem;
            outline: none;
            line-height: 1.5;
            transition: border-color var(--transition-speed);
        }

        .text-fallback-area:focus {
            border-color: var(--text-primary);
        }

        /* Chat / Review Assistant interface elements */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-history {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding-bottom: 2rem;
            min-height: 300px;
        }

        .chat-history::-webkit-scrollbar {
            width: 6px;
        }
        .chat-history::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 3px;
        }

        .chat-welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 2rem;
        }

        .chat-welcome-icon {
            margin-bottom: 1.25rem;
            opacity: 0.8;
            color: var(--text-primary);
        }

        /* Chat Message Bubbles */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
            max-width: 95%;
        }

        .message-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.35rem;
            color: var(--text-secondary);
        }

        .message.user .message-label {
            align-self: flex-end;
        }

        .message-bubble {
            padding: 1.1rem 1.4rem;
            border-radius: var(--radius-lg);
            line-height: 1.6;
            font-size: 0.9rem;
            box-shadow: var(--shadow-subtle);
        }

        .message.user .message-bubble {
            background-color: var(--accent-black);
            color: var(--accent-white);
            border-bottom-right-radius: 4px;
            border: 1px solid var(--accent-black);
        }

        .message.assistant .message-bubble {
            background-color: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        /* Markdown elements inside assistant response */
        .message-bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.25rem 0;
            font-size: 0.8rem;
        }

        .message-bubble th, .message-bubble td {
            border: 1px solid var(--border-color);
            padding: 0.6rem 0.8rem;
            text-align: left;
        }

        .message-bubble th {
            background-color: var(--bg-secondary);
            font-weight: 700;
            color: var(--text-primary);
        }

        .message-bubble ul, .message-bubble ol {
            margin-left: 1.25rem;
            margin-top: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .message-bubble li {
            margin-bottom: 0.35rem;
        }

        .message-bubble p {
            margin-bottom: 0.75rem;
        }
        
        .message-bubble p:last-child {
            margin-bottom: 0;
        }

        .message-bubble h1, .message-bubble h2, .message-bubble h3 {
            margin-top: 1.25rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .message-bubble h1 { font-size: 1.2rem; }
        .message-bubble h2 { font-size: 1.1rem; }
        .message-bubble h3 { font-size: 0.95rem; }

        .disclaimer-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            padding-top: 0.75rem;
            margin-top: 0.75rem;
            font-style: italic;
        }

        /* Input Controls (Modern minimal styling) */
        .input-bar {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 0.4rem;
            margin-top: 1rem;
            box-shadow: var(--shadow-subtle);
            transition: border-color var(--transition-speed);
        }

        .input-bar:focus-within {
            border-color: var(--text-primary);
        }

        .input-bar input {
            flex-grow: 1;
            border: none;
            background: transparent;
            color: var(--text-primary);
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            outline: none;
        }

        .input-bar input::placeholder {
            color: var(--text-secondary);
        }

        .btn-send {
            background-color: var(--accent-black);
            color: var(--accent-white);
            border: none;
            border-radius: var(--radius-md);
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity var(--transition-speed) ease;
            flex-shrink: 0;
        }

        .btn-send:hover {
            opacity: 0.9;
        }

        .btn-send svg {
            width: 16px;
            height: 16px;
            stroke: var(--accent-white);
            stroke-width: 2.5;
            fill: none;
        }

        /* Spinner elements */
        .typing-indicator {
            align-self: flex-start;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1.1rem;
            border-radius: var(--radius-md);
            border-bottom-left-radius: 4px;
            display: none;
            gap: 4px;
            align-items: center;
        }

        .dot {
            width: 5px;
            height: 5px;
            background: var(--text-primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        /* Flow slider indicators */
        .flow-indicator-container {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 1.5rem 0;
        }

        .flow-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--border-color);
            transition: background-color var(--transition-speed);
        }

        .flow-dot.active {
            background-color: var(--text-primary);
            width: 14px;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <div class="brand-logo"></div>
            <span>Contrx</span>
        </div>
        <div class="controls">
            <button class="btn-pill-secondary" id="theme-toggle">Dark mode</button>
            <button class="btn-pill-secondary" id="clear-workspace">Reset</button>
        </div>
    </header>

    <div class="workspace">
        <!-- LEFT PANEL: FILE UPLOAD & DOCUMENT METADATA -->
        <div class="panel panel-left">
            <h1 class="panel-title">Verify Policies</h1>
            <p class="panel-subtitle">Upload your draft corporate agreements, policy guidelines, or contracts to spot risks and retrieve compliance revisions.</p>

            <!-- File dropzone (Full container natively triggers File Dialog via Label) -->
            <label class="upload-container" id="drop-area" for="file-input">
                <div class="upload-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 5v14M5 12h14" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div>
                    <h3 style="font-size: 1rem; margin-bottom: 0.25rem; font-weight: 700; letter-spacing: -0.01em;">Upload document</h3>
                    <p style="font-size: 0.8rem; color: var(--text-secondary);">Supports PDF, DOCX, TXT formats</p>
                </div>
                <input type="file" id="file-input" class="file-input" accept=".txt,.pdf,.docx,.md">
                <span class="btn-pill" id="browse-btn">Browse files</span>
            </label>

            <!-- Alternative Text Box Paste -->
            <div class="text-fallback-container" id="paste-container">
                <div style="text-align: center; color: var(--text-secondary); font-size: 0.8rem; letter-spacing: 0.05em;">— OR —</div>
                <textarea class="text-fallback-area" id="pasted-text" placeholder="Paste your contract, policy, or legal clause here..."></textarea>
                <button class="btn-pill-secondary" id="analyze-pasted-btn" style="width: 100%;">Verify Pasted text</button>
            </div>

            <!-- Display of Processed State -->
            <div class="document-workspace" id="document-workspace">
                <div class="document-card">
                    <div class="doc-meta">
                        <span class="doc-name" id="display-filename">document.pdf</span>
                        <button class="btn-pill-secondary" id="replace-file-btn" style="padding: 0.4rem 1rem; font-size: 0.75rem;">Replace</button>
                    </div>
                    <div class="doc-text-preview" id="display-text-preview"></div>
                </div>
                
                <div class="flow-indicator-container">
                    <span class="flow-dot active"></span>
                    <span class="flow-dot"></span>
                    <span class="flow-dot"></span>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL: CHAT & COMPLIANCE REVIEWS -->
        <div class="panel panel-right">
            <div class="chat-container">
                <div class="chat-history" id="chat-history">
                    <!-- Welcome visual placeholder -->
                    <div class="chat-welcome" id="chat-welcome">
                        <div class="chat-welcome-icon">
                            <!-- Monochromatic legal scales icon vector -->
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-primary)">
                                <path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v1"/>
                                <path d="M18 8h4a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-4"/>
                                <path d="M10 12h4M12 10v4"/>
                            </svg>
                        </div>
                        <h2 style="font-size: 1.15rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-primary); letter-spacing: -0.01em;">Verification Output</h2>
                        <p style="font-size: 0.85rem; max-width: 280px; line-height: 1.5;">Configure your document on the left, then trigger initial review.</p>
                    </div>
                </div>

                <!-- Typing indicator -->
                <div class="typing-indicator" id="typing-indicator">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>

                <!-- User Interface Chat Controls -->
                <div class="input-bar">
                    <input type="text" id="user-input" placeholder="Ask questions or suggest changes..." disabled>
                    <button class="btn-send" id="send-btn" disabled>
                        <svg viewBox="0 0 24 24">
                            <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Handles
        const themeToggle = document.getElementById('theme-toggle');
        const clearWorkspace = document.getElementById('clear-workspace');
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const browseBtn = document.getElementById('browse-btn');
        const pasteContainer = document.getElementById('paste-container');
        const pastedText = document.getElementById('pasted-text');
        const analyzePastedBtn = document.getElementById('analyze-pasted-btn');
        const documentWorkspace = document.getElementById('document-workspace');
        const displayFilename = document.getElementById('display-filename');
        const displayTextPreview = document.getElementById('display-text-preview');
        const replaceFileBtn = document.getElementById('replace-file-btn');
        const chatHistory = document.getElementById('chat-history');
        const chatWelcome = document.getElementById('chat-welcome');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        // Document state track
        let isDocumentLoaded = false;

        // Theme Toggle Manager (with LocalStorage persistence)
        const savedTheme = localStorage.getItem('theme') || 'dark'; // Dark Mode First to mimic Neon.tech
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'light' ? 'Dark mode' : 'Light mode';

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', targetTheme);
            themeToggle.textContent = targetTheme === 'light' ? 'Dark mode' : 'Light mode';
            localStorage.setItem('theme', targetTheme);
        });

        // Setup Drag & Drop
        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropArea.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropArea.classList.remove('dragover');
            }, false);
        });

        dropArea.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });

        // UI loading state indicators
        function setUploadLoadingState(isLoading) {
            if (isLoading) {
                dropArea.style.opacity = '0.6';
                dropArea.style.pointerEvents = 'none';
                browseBtn.textContent = 'Processing...';
                analyzePastedBtn.setAttribute('disabled', 'true');
                analyzePastedBtn.textContent = 'Processing...';
            } else {
                dropArea.style.opacity = '1';
                dropArea.style.pointerEvents = 'auto';
                browseBtn.textContent = 'Browse files';
                analyzePastedBtn.removeAttribute('disabled');
                analyzePastedBtn.textContent = 'Verify Pasted text';
            }
        }

        // Fallback pasted plain text submitter
        analyzePastedBtn.addEventListener('click', () => {
            const textValue = pastedText.value.trim();
            if (!textValue) return alert("Please paste text before submitting.");
            
            setUploadLoadingState(true);

            fetch('/api/upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: textValue })
            })
            .then(res => res.json())
            .then(data => {
                setUploadLoadingState(false);
                if (data.status === 'success') {
                    showDocumentView("Pasted Text", data.text);
                    triggerInitialReview();
                } else {
                    alert(data.message);
                }
            })
            .catch(err => {
                setUploadLoadingState(false);
                console.error(err);
                alert("Failed to submit pasted text.");
            });
        });

        // Core File processor
        function handleFile(file) {
            // Frontend 3 MB guard to prevent Vercel's 4.5 MB body limit and 10-second timeout errors
            const maxSizeBytes = 3 * 1024 * 1024; 
            if (file.size > maxSizeBytes) {
                alert("This file is too large for serverless processing. Please upload a document under 3 MB to avoid Vercel limits, or paste the text directly.");
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            setUploadLoadingState(true);

            fetch('/api/upload', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                setUploadLoadingState(false);
                if (data.status === 'success') {
                    showDocumentView(data.filename, data.text);
                    triggerInitialReview();
                } else {
                    alert(data.message);
                }
            })
            .catch(err => {
                setUploadLoadingState(false);
                console.error(err);
                alert("Failed to process file.");
            });
        }

        // Display Document Workspace Panel
        function showDocumentView(filename, text) {
            isDocumentLoaded = true;
            dropArea.style.display = 'none';
            pasteContainer.style.display = 'none';
            documentWorkspace.style.display = 'flex';
            
            displayFilename.textContent = filename;
            displayTextPreview.textContent = text || "[Blank text extracted]";
            
            userInput.removeAttribute('disabled');
            sendBtn.removeAttribute('disabled');
            userInput.placeholder = "Ask something about your document...";
        }

        // Trigger Watsonx Initial Analysis Session
        function triggerInitialReview() {
            chatWelcome.style.display = 'none';
            // Clear prior conversation logs visually
            const messages = chatHistory.querySelectorAll('.message');
            messages.forEach(m => m.remove());
            
            showLoading(true);

            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ initial_review: true })
            })
            .then(res => res.json())
            .then(data => {
                showLoading(false);
                if (data.status === 'success') {
                    appendMessage('assistant', data.response);
                } else {
                    appendMessage('assistant', `Error executing analysis: ${data.message}`);
                }
            })
            .catch(err => {
                showLoading(false);
                appendMessage('assistant', `Failed to connect to assistant: ${err}`);
            });
        }

        // User follow-up conversation trigger
        function sendChatMessage() {
            const userText = userInput.value.trim();
            if (!userText || !isDocumentLoaded) return;

            appendMessage('user', userText);
            userInput.value = '';
            showLoading(true);

            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: userText, initial_review: false })
            })
            .then(res => res.json())
            .then(data => {
                showLoading(false);
                if (data.status === 'success') {
                    appendMessage('assistant', data.response);
                } else {
                    appendMessage('assistant', `Error contacting agent: ${data.message}`);
                }
            })
            .catch(err => {
                showLoading(false);
                appendMessage('assistant', `Connection failure: ${err}`);
            });
        }

        // Button events for text transmission
        sendBtn.addEventListener('click', sendChatMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });

        // Appending text content (handling markdown parsing cleanly)
        function appendMessage(sender, text) {
            const wrapper = document.createElement('div');
            wrapper.classList.add('message', sender);

            const label = document.createElement('div');
            label.classList.add('message-label');
            label.textContent = sender === 'user' ? 'You' : 'Agent';

            const bubble = document.createElement('div');
            bubble.classList.add('message-bubble');
            
            if (sender === 'assistant') {
                // Utilize marked for markdown styling rendering
                bubble.innerHTML = marked.parse(text);
            } else {
                bubble.textContent = text;
            }

            wrapper.appendChild(label);
            wrapper.appendChild(bubble);
            chatHistory.appendChild(wrapper);

            // Maintain automatic scroll focus
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        // Toggle Loading indicator
        function showLoading(state) {
            if (state) {
                typingIndicator.style.display = 'flex';
                chatHistory.scrollTop = chatHistory.scrollHeight;
            } else {
                typingIndicator.style.display = 'none';
            }
        }

        // Reset workspace to clean states
        function resetApp() {
            fetch('/api/clear', { method: 'POST' })
            .then(() => {
                isDocumentLoaded = false;
                documentWorkspace.style.display = 'none';
                dropArea.style.display = 'flex';
                pasteContainer.style.display = 'flex';
                pastedText.value = '';
                fileInput.value = '';
                
                userInput.value = '';
                userInput.setAttribute('disabled', 'true');
                userInput.placeholder = "Upload document to initiate chat...";
                sendBtn.setAttribute('disabled', 'true');

                // Clear chat
                const messages = chatHistory.querySelectorAll('.message');
                messages.forEach(m => m.remove());
                chatWelcome.style.display = 'flex';
            });
        }

        clearWorkspace.addEventListener('click', resetApp);
        replaceFileBtn.addEventListener('click', resetApp);
    </script>
</body>
</html>
